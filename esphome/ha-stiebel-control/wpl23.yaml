#
#  To add a new model, create signal_requests_yourmodel.h and a thin yourmodel.yaml
#  following this pattern. See CONTRIBUTING.md for full instructions.
#

esphome:
  includes:
    - ha-stiebel-control/signal_requests_wpl23.h
