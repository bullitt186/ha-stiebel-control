# ============================================================================
# SG Ready Automation Example
# ============================================================================
# This automation maps your E3DC PV system's SG Ready state to the heat pump
# controller. Copy this to your Home Assistant automations.yaml or include
# this package in your configuration.
#
# Prerequisites:
# - sensor.s10x_sg_ready_numeric exists and provides values 1-4
# - ESPHome heat pump controller with SG Ready support is running
# - MQTT integration is configured
#
# The ESPHome controller automatically handles:
# - State 1: EVU Lock → Bereitschaft mode + restore normal DHW temp
# - State 2: Normal → Automatik mode + restore normal DHW temp
# - State 3: Recommended → Tagbetrieb mode + DHW boost (configurable via number.manager_sg_ready_boost_state3, default +3.0°C)
# - State 4: Forced → Tagbetrieb mode + DHW boost (configurable via number.manager_sg_ready_boost_state4, default +5.0°C)
#
# Temperature boost is handled internally - no separate automations needed!
# Adjust boost amounts via: number.manager_sg_ready_boost_state3 (0-10°C)
#                           number.manager_sg_ready_boost_state4 (0-15°C)
# ============================================================================

automation:
  # ============================================================================
  # Main SG Ready State Sync - Maps E3DC state to Heat Pump
  # ============================================================================
  - id: sg_ready_state_sync
    alias: "Wärmepumpe: SG Ready State Sync"
    description: "Synchronisiert E3DC SG Ready Zustand mit Wärmepumpe"
    mode: restart  # Restart if triggered again before completion
    
    trigger:
      # Trigger when E3DC SG Ready state changes
      - platform: state
        entity_id: sensor.s10x_sg_ready_numeric
        
      # Also trigger on Home Assistant startup to ensure sync
      - platform: homeassistant
        event: start
    
    condition:
      # Only run if E3DC sensor has a valid value (1-4)
      - condition: template
        value_template: >
          {{ states('sensor.s10x_sg_ready_numeric') | int(0) in [1, 2, 3, 4] }}
    
    action:
      - service: select.select_option
        target:
          entity_id: select.manager_sg_ready_zustand
        data:
          option: >
            {% set state = states('sensor.s10x_sg_ready_numeric') | int %}
            {% if state == 1 %}1 - EVU Sperre
            {% elif state == 2 %}2 - Normal
            {% elif state == 3 %}3 - Empfohlen
            {% elif state == 4 %}4 - Zwang
            {% else %}2 - Normal{% endif %}
      
      - service: system_log.write
        data:
          message: >
            SG Ready: E3DC state {{ states('sensor.s10x_sg_ready_numeric') }}
            → Heat pump {{ states('select.manager_sg_ready_zustand') }}
            (Temperature boost handled automatically by ESPHome)
          level: info

  # ============================================================================
  # Optional: Adjust Temperature Boost Amounts
  # ============================================================================
  # You can configure the boost amounts for states 3 and 4 via number entities.
  # These are configured once and persist until changed.
  # ============================================================================
  
  # Example: Set custom boost for State 3 (0-10°C range, 0.5°C steps)
  # - id: sg_ready_configure_state3_boost
  #   alias: "Wärmepumpe: SG Ready State 3 Boost konfigurieren"
  #   trigger:
  #     - platform: homeassistant
  #       event: start
  #   action:
  #     - service: number.set_value
  #       target:
  #         entity_id: number.manager_sg_ready_boost_state3
  #       data:
  #         value: 3.5  # Your preferred boost in °C

  # Example: Set custom boost for State 4 (0-15°C range, 0.5°C steps)
  # - id: sg_ready_configure_state4_boost
  #   alias: "Wärmepumpe: SG Ready State 4 Boost konfigurieren"
  #   trigger:
  #     - platform: homeassistant
  #       event: start
  #   action:
  #     - service: number.set_value
  #       target:
  #         entity_id: number.manager_sg_ready_boost_state4
  #       data:
  #         value: 7.0  # Your preferred boost in °C


# ============================================================================
# Available Entities for SG Ready Control
# ============================================================================
# 
# select.manager_sg_ready_zustand
#   Options: "1 - EVU Sperre", "2 - Normal", "3 - Empfohlen", "4 - Zwang"
#   Controls the SG Ready state which automatically manages:
#   - Operating mode (PROGRAMMSCHALTER)
#   - DHW temperature boost/restore
#
# sensor.heatingpump_sg_ready_aktueller_zustand (text sensor)
#   Read-only sensor showing currently active SG Ready state
#   Values: "Deaktiviert", "1 - EVU Sperre", "2 - Normal", "3 - Empfohlen", "4 - Zwang"
#   Useful for automations and dashboard displays
#
# number.manager_sg_ready_boost_state3
#   Range: 0-10°C, Step: 0.5°C, Default: 3.0°C
#   Temperature boost applied when in State 3 (Recommended)
#   Example: If normal DHW is 48°C and boost is 3.0°C → 51°C in State 3
#
# sensor.heatingpump_sg_ready_boost_state_3 (temperature sensor)
#   Read-only sensor showing current boost setting for State 3
#
# number.manager_sg_ready_boost_state4
#   Range: 0-15°C, Step: 0.5°C, Default: 5.0°C
#   Temperature boost applied when in State 4 (Forced)
#   Example: If normal DHW is 48°C and boost is 5.0°C → 53°C in State 4
#
# sensor.heatingpump_sg_ready_boost_state_4 (temperature sensor)
#   Read-only sensor showing current boost setting for State 4
#
# sensor.manager_programmschalter
#   Read-only sensor showing current operating mode
#   Values: "Bereitschaft", "Automatik", "Tagbetrieb", "Absenkbetrieb", "Warmwasser"
#
# sensor.manager_einstell_speichersolltemp / number.manager_einstell_speichersolltemp
#   Current DHW setpoint (read from sensor, write via number)
#   ESPHome automatically adjusts this based on SG Ready state and boost settings
# ============================================================================

