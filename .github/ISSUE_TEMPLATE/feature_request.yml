name: Feature Request
description: Suggest a new sensor, feature, or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe what you need and why.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New sensor / signal
        - New heat pump model support
        - New board / hardware support
        - Home Assistant integration improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: heat_pump_model
    attributes:
      label: Heat Pump Model (if applicable)
      placeholder: "e.g. WPL 25 AC"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the Feature
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Use Case
      description: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: elster_signal
    attributes:
      label: Elster Signal Name (if requesting a new sensor)
      description: If you know the signal name from ElsterTable.h or the heat pump manual, include it here.
      placeholder: "e.g. TEMP_AUSSEN, VERDICHTER_DREHZAHL"
    validations:
      required: false
